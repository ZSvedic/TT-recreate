<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 230" width="360" height="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <!-- TamedTable feature illustration: Rank by seniority — "sort the titles by seniority" -->
  <rect x="2" y="2" width="356" height="226" rx="16" fill="#FFFFFF" stroke="#DCDCDC"/>
  <rect x="18" y="18" width="324" height="36" rx="18" fill="#EFEBF7" stroke="#D8D0EC"/>
  <circle cx="40" cy="36" r="7" fill="#96BED7"/>
  <path d="M37.5 32.5 L43.5 36 L37.5 39.5 Z" fill="#281C60"/>
  <text x="56" y="41" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13.5" fill="#281C60">sort the titles by seniority</text>
  <g>
    <path d="M18 76 q0 -6 6 -6 h312 q6 0 6 6 v20 h-324 Z" fill="#281C60"/>
    <text x="32" y="89" font-size="11.5" font-weight="600" fill="#FFFFFF">Name</text>
    <text x="110" y="89" font-size="11.5" font-weight="600" fill="#FFFFFF">Title</text>
    <text x="262" y="89" font-size="10.5" font-weight="600" fill="#96BED7">rank: senior → junior</text>
    <path d="M338 80 l0 8 M335 85 l3 4 l3 -4" stroke="#96BED7" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <g font-size="10.5" fill="#281C60">
      <rect x="18" y="96" width="324" height="22" fill="#FFFFFF"/>
      <text x="32" y="111">Eve</text>
      <text x="110" y="111">Chief Technology Officer</text>
      <rect x="18" y="118" width="324" height="22" fill="#F6F2EB"/>
      <text x="32" y="133">Cara</text>
      <text x="110" y="133">VP of Sales</text>
      <rect x="18" y="140" width="324" height="22" fill="#FFFFFF"/>
      <text x="32" y="155">Bob</text>
      <text x="110" y="155">Senior Software Engineer</text>
      <rect x="18" y="162" width="324" height="22" fill="#F6F2EB"/>
      <text x="32" y="177">Dan</text>
      <text x="110" y="177">Junior Analyst</text>
      <rect x="18" y="184" width="324" height="22" fill="#FFFFFF"/>
      <text x="32" y="199">Ana</text>
      <text x="110" y="199">Marketing Intern</text>
    </g>
    <rect x="18" y="70" width="324" height="136" rx="6" fill="none" stroke="#DCDCDC"/>
  </g>
  <!-- the added SeniorityRank column the sort orders on, real replay values -->
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="10.5" font-weight="600" fill="#281C60" text-anchor="end">
    <text x="336" y="111">100</text>
    <text x="336" y="133">90</text>
    <text x="336" y="155">60</text>
    <text x="336" y="177">20</text>
    <text x="336" y="199">1</text>
  </g>
</svg>
