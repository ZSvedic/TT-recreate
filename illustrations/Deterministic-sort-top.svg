<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 230" width="360" height="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <!-- TamedTable feature illustration: Sort or take the top few — "sort by revenue, top 10" -->
  <rect x="2" y="2" width="356" height="226" rx="16" fill="#FFFFFF" stroke="#DCDCDC"/>
  <rect x="18" y="18" width="324" height="36" rx="18" fill="#EFEBF7" stroke="#D8D0EC"/>
  <circle cx="40" cy="36" r="7" fill="#96BED7"/>
  <path d="M37.5 32.5 L43.5 36 L37.5 39.5 Z" fill="#281C60"/>
  <text x="56" y="41" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13.5" fill="#281C60">sort by revenue, top 10</text>
  <g>
    <path d="M18 78 q0 -6 6 -6 h312 q6 0 6 6 v24 h-324 Z" fill="#281C60"/>
    <text x="32" y="91" font-size="12" font-weight="600" fill="#FFFFFF">Region</text>
    <text x="200" y="91" font-size="12" font-weight="600" fill="#FFFFFF">Revenue</text>
    <!-- sort arrow on revenue header -->
    <path d="M300 84 l5 0 l-2.5 5 Z" fill="#96BED7"/>
    <g font-size="12" font-family="JetBrains Mono, ui-monospace, monospace">
      <rect x="18" y="104" width="324" height="30" fill="#E7F1F8"/>
      <rect x="18" y="104" width="4" height="30" fill="#96BED7"/>
      <text x="32" y="123" font-family="Inter, ui-sans-serif, system-ui, sans-serif" fill="#281C60">Pacific</text>
      <text x="200" y="123" fill="#281C60">501,200</text>
      <rect x="18" y="134" width="324" height="30" fill="#FFFFFF"/>
      <text x="32" y="153" font-family="Inter, ui-sans-serif, system-ui, sans-serif" fill="#281C60">West</text>
      <text x="200" y="153" fill="#281C60">420,000</text>
      <rect x="18" y="164" width="324" height="30" fill="#F6F2EB"/>
      <text x="32" y="183" font-family="Inter, ui-sans-serif, system-ui, sans-serif" fill="#281C60">Southwest</text>
      <text x="200" y="183" fill="#281C60">310,900</text>
      <rect x="18" y="194" width="324" height="14" fill="#FFFFFF"/>
    </g>
    <text x="32" y="205" font-size="10" fill="#6A6280">⋯ keeps the top 10 of 12 rows</text>
    <rect x="18" y="72" width="324" height="136" rx="6" fill="none" stroke="#DCDCDC"/>
  </g>
  <!-- descending bars hint at right edge -->
  <g fill="#281C60" opacity="0.85">
    <rect x="320" y="118" width="14" height="6" rx="2"/>
    <rect x="320" y="148" width="10" height="6" rx="2"/>
    <rect x="320" y="178" width="7" height="6" rx="2"/>
  </g>
</svg>
