<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 230" width="360" height="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <!-- TamedTable feature illustration: Combine two tables — "join with country codes to add ISO and Region" -->
  <rect x="2" y="2" width="356" height="226" rx="16" fill="#FFFFFF" stroke="#DCDCDC"/>
  <rect x="18" y="18" width="324" height="36" rx="18" fill="#EFEBF7" stroke="#D8D0EC"/>
  <circle cx="40" cy="36" r="7" fill="#96BED7"/>
  <path d="M37.5 32.5 L43.5 36 L37.5 39.5 Z" fill="#281C60"/>
  <text x="56" y="41" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12.5" fill="#281C60">join with country codes</text>
  <!-- left small table: customers -->
  <g font-size="10.5">
    <text x="18" y="80" font-size="10.5" fill="#6A6280">customers</text>
    <rect x="18" y="86" width="112" height="24" fill="#281C60"/>
    <text x="26" y="102" font-size="10.5" font-weight="600" fill="#96BED7">Country</text>
    <rect x="18" y="110" width="112" height="22" fill="#FFFFFF"/>
    <text x="26" y="125" font-family="JetBrains Mono, ui-monospace, monospace" fill="#281C60">USA</text>
    <rect x="18" y="132" width="112" height="22" fill="#F6F2EB"/>
    <text x="26" y="147" font-family="JetBrains Mono, ui-monospace, monospace" fill="#281C60">England</text>
    <rect x="18" y="154" width="112" height="22" fill="#FFFFFF"/>
    <text x="26" y="169" font-family="JetBrains Mono, ui-monospace, monospace" fill="#281C60">Deutschland</text>
    <rect x="18" y="86" width="112" height="90" fill="none" stroke="#DCDCDC"/>
  </g>
  <!-- join connector: keys converge at a node, then fan out to the joined table -->
  <g stroke="#96BED7" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M130 121 C 141 121, 144 143, 149 143"/>
    <path d="M130 143 C 141 143, 144 143, 149 143"/>
    <path d="M130 165 C 141 165, 144 143, 149 143"/>
    <path d="M149 143 C 154 143, 157 121, 168 121"/>
    <path d="M149 143 C 154 143, 157 143, 168 143"/>
    <path d="M149 143 C 154 143, 157 165, 168 165"/>
  </g>
  <circle cx="149" cy="143" r="4.5" fill="#96BED7" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- right table: joined, ISO and Region columns added -->
  <g font-size="10.5">
    <text x="168" y="80" font-size="10.5" fill="#6A6280">joined — ISO + Region added</text>
    <rect x="168" y="86" width="174" height="24" fill="#281C60"/>
    <text x="176" y="102" font-size="10.5" font-weight="600" fill="#FFFFFF">Country</text>
    <text x="250" y="102" font-size="10.5" font-weight="600" fill="#96BED7">ISO</text>
    <text x="282" y="102" font-size="10.5" font-weight="600" fill="#96BED7">Region</text>
    <rect x="168" y="110" width="174" height="22" fill="#FFFFFF"/>
    <rect x="244" y="110" width="98" height="22" fill="#E7F1F8"/>
    <text x="176" y="125" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#281C60">USA</text>
    <text x="250" y="125" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#281C60">US</text>
    <text x="282" y="125" font-size="10" fill="#281C60">Americas</text>
    <rect x="168" y="132" width="174" height="22" fill="#F6F2EB"/>
    <rect x="244" y="132" width="98" height="22" fill="#E7F1F8"/>
    <text x="176" y="147" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#281C60">England</text>
    <text x="250" y="147" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#281C60">GB</text>
    <text x="282" y="147" font-size="10" fill="#281C60">Europe</text>
    <rect x="168" y="154" width="174" height="22" fill="#FFFFFF"/>
    <rect x="244" y="154" width="98" height="22" fill="#E7F1F8"/>
    <text x="176" y="169" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#281C60">Deutschland</text>
    <text x="250" y="169" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#281C60">DE</text>
    <text x="282" y="169" font-size="10" fill="#281C60">Europe</text>
    <rect x="244" y="86" width="98" height="90" fill="none" stroke="#96BED7"/>
    <rect x="168" y="86" width="174" height="90" fill="none" stroke="#DCDCDC"/>
  </g>
  <text x="18" y="200" font-size="11" fill="#6A6280">matched on </text>
  <text x="86" y="200" font-size="11" font-family="JetBrains Mono, ui-monospace, monospace" fill="#281C60">Country</text>
</svg>
