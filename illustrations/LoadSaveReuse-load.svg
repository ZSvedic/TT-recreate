<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 230" width="360" height="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <!-- TamedTable feature illustration: Load a file or a URL — web or CLI, same engine underneath -->
  <rect x="2" y="2" width="356" height="226" rx="16" fill="#FFFFFF" stroke="#DCDCDC"/>
  <!-- prompt chip -->
  <rect x="18" y="18" width="324" height="36" rx="18" fill="#EFEBF7" stroke="#D8D0EC"/>
  <text x="34" y="41" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13.5" fill="#281C60">load a file or a URL</text>
  <!-- browser window -->
  <g>
    <rect x="22" y="72" width="146" height="86" rx="8" fill="#FFFFFF" stroke="#DCDCDC"/>
    <path d="M22 80 q0 -8 8 -8 h130 q8 0 8 8 v10 h-146 Z" fill="#F6F2EB"/>
    <circle cx="34" cy="81" r="3" fill="#96BED7"/>
    <circle cx="44" cy="81" r="3" fill="#DCDCDC"/>
    <circle cx="54" cy="81" r="3" fill="#DCDCDC"/>
    <text x="34" y="108" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9.5" fill="#281C60">customers-input.csv</text>
    <rect x="34" y="118" width="92" height="8" rx="3" fill="#EFEBF7"/>
    <rect x="34" y="132" width="110" height="8" rx="3" fill="#EFEBF7"/>
    <text x="95" y="174" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6A6280" text-anchor="middle">web app</text>
  </g>
  <!-- terminal window -->
  <g>
    <rect x="192" y="72" width="146" height="86" rx="8" fill="#281C60"/>
    <path d="M192 80 q0 -8 8 -8 h130 q8 0 8 8 v10 h-146 Z" fill="#1F1648"/>
    <circle cx="204" cy="81" r="3" fill="#96BED7"/>
    <circle cx="214" cy="81" r="3" fill="#4A3E7A"/>
    <circle cx="224" cy="81" r="3" fill="#4A3E7A"/>
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="9.5">
      <text x="204" y="106" fill="#96BED7">$ <tspan fill="#C9C2E8">tamedtable \</tspan></text>
      <text x="204" y="119" fill="#C9C2E8">  customers-input.csv</text>
      <text x="204" y="132" fill="#9FD3B0">&gt; normalize phones</text>
      <text x="204" y="145" fill="#C9C2E8">19 rows changed ✓</text>
    </g>
    <text x="265" y="174" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6A6280" text-anchor="middle">command line</text>
  </g>
  <!-- shared core -->
  <path d="M95 158 q0 22 40 22 h50 q40 0 40 -22" fill="none" stroke="#96BED7" stroke-width="1.5" stroke-dasharray="3 3"/>
  <rect x="132" y="190" width="96" height="26" rx="13" fill="#E7F1F8" stroke="#96BED7"/>
  <text x="180" y="207" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#281C60" text-anchor="middle">one core</text>
</svg>
