<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 230" width="360" height="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <!-- TamedTable feature illustration: Save the clean data — ":save clean.csv" -->
  <rect x="2" y="2" width="356" height="226" rx="16" fill="#FFFFFF" stroke="#DCDCDC"/>
  <!-- prompt chip -->
  <rect x="18" y="18" width="324" height="36" rx="18" fill="#EFEBF7" stroke="#D8D0EC"/>
  <text x="34" y="41" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13.5" fill="#96BED7">:save</text>
  <text x="86" y="41" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13.5" fill="#281C60">clean.csv</text>
  <!-- clean mini table: real customers-input.csv rows, phones normalized -->
  <g>
    <path d="M18 78 q0 -6 6 -6 h180 q6 0 6 6 v22 h-192 Z" fill="#281C60"/>
    <text x="32" y="91" font-size="12" font-weight="600" fill="#FFFFFF">FirstName</text>
    <text x="116" y="91" font-size="12" font-weight="600" fill="#FFFFFF">Phone</text>
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="9.5" fill="#281C60">
      <rect x="18" y="100" width="192" height="26" fill="#FFFFFF"/>
      <text x="32" y="117" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5">John</text>
      <text x="116" y="117">+12005551234</text>
      <rect x="18" y="126" width="192" height="26" fill="#F6F2EB"/>
      <text x="32" y="143" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5">bob</text>
      <text x="116" y="143">+445558765</text>
      <rect x="18" y="152" width="192" height="26" fill="#FFFFFF"/>
      <text x="32" y="169" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5">Michael</text>
      <text x="116" y="169">+445551234</text>
    </g>
    <rect x="18" y="72" width="192" height="106" rx="6" fill="none" stroke="#DCDCDC"/>
  </g>
  <!-- arrow to file -->
  <path d="M222 125 h26" stroke="#96BED7" stroke-width="2"/>
  <path d="M246 119 l10 6 l-10 6 Z" fill="#96BED7"/>
  <!-- csv file -->
  <path d="M268 86 h44 l16 16 v76 q0 5 -5 5 h-55 q-5 0 -5 -5 v-87 q0 -5 5 -5 Z" fill="#E7F1F8" stroke="#96BED7"/>
  <path d="M312 86 v16 h16" fill="none" stroke="#96BED7"/>
  <text x="298" y="150" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#281C60" text-anchor="middle">CSV</text>
  <text x="298" y="172" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#6A6280" text-anchor="middle">cleaned</text>
</svg>
