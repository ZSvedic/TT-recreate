<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 230" width="360" height="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <!-- TamedTable feature illustration: Split the address — "split the address into its parts" -->
  <rect x="2" y="2" width="356" height="226" rx="16" fill="#FFFFFF" stroke="#DCDCDC"/>
  <!-- prompt chip -->
  <rect x="18" y="18" width="324" height="36" rx="18" fill="#EFEBF7" stroke="#D8D0EC"/>
  <circle cx="40" cy="36" r="7" fill="#96BED7"/>
  <path d="M37.5 32.5 L43.5 36 L37.5 39.5 Z" fill="#281C60"/>
  <text x="56" y="41" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#281C60">split the address into its parts</text>
  <!-- table -->
  <g>
    <path d="M18 78 q0 -6 6 -6 h312 q6 0 6 6 v24 h-324 Z" fill="#281C60"/>
    <text x="32" y="91" font-size="12" font-weight="600" fill="#FFFFFF">address</text>
    <text x="186" y="91" font-size="12" font-weight="600" fill="#96BED7">street</text>
    <text x="252" y="91" font-size="12" font-weight="600" fill="#96BED7">city</text>
    <text x="306" y="91" font-size="12" font-weight="600" fill="#96BED7">zip</text>
    <g font-size="11" fill="#281C60">
      <!-- one messy free-text address splitting into structured parts -->
      <rect x="18" y="104" width="324" height="102" fill="#FFFFFF"/>
      <text x="32" y="126" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">"221b Baker St,</text>
      <text x="32" y="144" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">London NW1 6XE"</text>
      <!-- arrow -->
      <path d="M150 138 h18 m-6 -5 l6 5 l-6 5" fill="none" stroke="#96BED7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- structured chips -->
      <rect x="178" y="115" width="156" height="22" rx="5" fill="#E7F1F8" stroke="#96BED7"/>
      <text x="186" y="130" font-family="JetBrains Mono, ui-monospace, monospace">221b Baker St</text>
      <rect x="178" y="143" width="100" height="22" rx="5" fill="#E7F1F8" stroke="#96BED7"/>
      <text x="186" y="158" font-family="JetBrains Mono, ui-monospace, monospace">London</text>
      <rect x="178" y="171" width="120" height="22" rx="5" fill="#E7F1F8" stroke="#96BED7"/>
      <text x="186" y="186" font-family="JetBrains Mono, ui-monospace, monospace">NW1 6XE</text>
    </g>
    <rect x="18" y="72" width="324" height="134" rx="6" fill="none" stroke="#DCDCDC"/>
  </g>
</svg>
