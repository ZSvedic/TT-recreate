<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 230" width="360" height="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <!-- TamedTable feature illustration: Drop duplicates — "remove duplicate emails" -->
  <rect x="2" y="2" width="356" height="226" rx="16" fill="#FFFFFF" stroke="#DCDCDC"/>
  <rect x="18" y="18" width="324" height="36" rx="18" fill="#EFEBF7" stroke="#D8D0EC"/>
  <circle cx="40" cy="36" r="7" fill="#96BED7"/>
  <path d="M37.5 32.5 L43.5 36 L37.5 39.5 Z" fill="#281C60"/>
  <text x="56" y="41" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13.5" fill="#281C60">remove duplicate emails</text>
  <g>
    <path d="M18 78 q0 -6 6 -6 h312 q6 0 6 6 v24 h-324 Z" fill="#281C60"/>
    <text x="32" y="91" font-size="12" font-weight="600" fill="#FFFFFF">name</text>
    <text x="150" y="91" font-size="12" font-weight="600" fill="#FFFFFF">email</text>
    <g font-size="12">
      <rect x="18" y="104" width="324" height="30" fill="#FFFFFF"/>
      <text x="32" y="123" fill="#281C60">Ana</text>
      <text x="150" y="123" font-family="JetBrains Mono, ui-monospace, monospace" fill="#281C60">ana@acme.io</text>

      <!-- duplicate row: struck out / removed -->
      <rect x="18" y="134" width="324" height="30" fill="#FBEEF0"/>
      <text x="32" y="153" fill="#9A8FB8">Ana</text>
      <text x="150" y="153" font-family="JetBrains Mono, ui-monospace, monospace" fill="#9A8FB8" text-decoration="line-through">ana@acme.io</text>
      <text x="318" y="153" font-size="13" fill="#C0556B">✕</text>

      <rect x="18" y="164" width="324" height="30" fill="#FFFFFF"/>
      <text x="32" y="183" fill="#281C60">Bo</text>
      <text x="150" y="183" font-family="JetBrains Mono, ui-monospace, monospace" fill="#281C60">bo@acme.io</text>
    </g>
    <rect x="18" y="72" width="324" height="122" rx="6" fill="none" stroke="#DCDCDC"/>
  </g>
  <text x="18" y="216" font-size="11" fill="#6A6280">1 duplicate removed</text>
</svg>
