<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 230" width="360" height="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <!-- TamedTable feature illustration: Keep the rows you want — "keep customers in the USA" -->
  <rect x="2" y="2" width="356" height="226" rx="16" fill="#FFFFFF" stroke="#DCDCDC"/>
  <rect x="18" y="18" width="324" height="36" rx="18" fill="#EFEBF7" stroke="#D8D0EC"/>
  <circle cx="40" cy="36" r="7" fill="#96BED7"/>
  <path d="M37.5 32.5 L43.5 36 L37.5 39.5 Z" fill="#281C60"/>
  <text x="56" y="41" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13.5" fill="#281C60">keep customers in the USA</text>
  <g>
    <path d="M18 78 q0 -6 6 -6 h312 q6 0 6 6 v24 h-324 Z" fill="#281C60"/>
    <text x="32" y="91" font-size="12" font-weight="600" fill="#FFFFFF">customer</text>
    <text x="200" y="91" font-size="12" font-weight="600" fill="#FFFFFF">country</text>
    <g font-size="12">
      <!-- kept -->
      <rect x="18" y="104" width="324" height="26" fill="#E7F1F8"/>
      <rect x="18" y="104" width="4" height="26" fill="#96BED7"/>
      <text x="32" y="121" fill="#281C60">Mara K.</text>
      <text x="200" y="121" font-family="JetBrains Mono, ui-monospace, monospace" fill="#281C60">USA</text>
      <!-- dropped -->
      <rect x="18" y="130" width="324" height="26" fill="#FFFFFF"/>
      <text x="32" y="147" fill="#B8B0C8">Otto B.</text>
      <text x="200" y="147" font-family="JetBrains Mono, ui-monospace, monospace" fill="#B8B0C8">DEU</text>
      <!-- kept -->
      <rect x="18" y="156" width="324" height="26" fill="#E7F1F8"/>
      <rect x="18" y="156" width="4" height="26" fill="#96BED7"/>
      <text x="32" y="173" fill="#281C60">Lena R.</text>
      <text x="200" y="173" font-family="JetBrains Mono, ui-monospace, monospace" fill="#281C60">USA</text>
      <!-- dropped -->
      <rect x="18" y="182" width="324" height="26" fill="#FFFFFF"/>
      <text x="32" y="199" fill="#B8B0C8">Yuki T.</text>
      <text x="200" y="199" font-family="JetBrains Mono, ui-monospace, monospace" fill="#B8B0C8">JPN</text>
    </g>
    <rect x="18" y="72" width="324" height="136" rx="6" fill="none" stroke="#DCDCDC"/>
  </g>
</svg>
