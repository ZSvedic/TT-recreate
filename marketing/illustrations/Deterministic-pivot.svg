<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 230" width="360" height="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <!-- TamedTable feature illustration: Reshape tall to wide — "Pivot Quarter into columns, with Revenue as the value" -->
  <rect x="2" y="2" width="356" height="226" rx="16" fill="#FFFFFF" stroke="#DCDCDC"/>
  <rect x="18" y="18" width="324" height="36" rx="18" fill="#EFEBF7" stroke="#D8D0EC"/>
  <circle cx="40" cy="36" r="7" fill="#96BED7"/>
  <path d="M37.5 32.5 L43.5 36 L37.5 39.5 Z" fill="#281C60"/>
  <text x="56" y="41" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#281C60">pivot Quarter into columns</text>
  <!-- tall (before) -->
  <g font-size="10.5">
    <text x="18" y="80" font-size="10.5" fill="#6A6280">tall</text>
    <rect x="18" y="86" width="130" height="22" fill="#281C60"/>
    <text x="24" y="101" font-size="9.5" font-weight="600" fill="#FFFFFF">Region</text>
    <text x="66" y="101" font-size="9.5" font-weight="600" fill="#FFFFFF">Quarter</text>
    <text x="110" y="101" font-size="9.5" font-weight="600" fill="#FFFFFF">Revenue</text>
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#281C60">
      <rect x="18" y="108" width="130" height="20" fill="#FFFFFF"/><text x="24" y="122">NA</text><text x="66" y="122">Q1</text><text x="110" y="122">100</text>
      <rect x="18" y="128" width="130" height="20" fill="#F6F2EB"/><text x="24" y="142">NA</text><text x="66" y="142">Q2</text><text x="110" y="142">150</text>
      <rect x="18" y="148" width="130" height="20" fill="#FFFFFF"/><text x="24" y="162">NA</text><text x="66" y="162">Q3</text><text x="110" y="162">200</text>
      <rect x="18" y="168" width="130" height="20" fill="#F6F2EB"/><text x="24" y="182">NA</text><text x="66" y="182">Q4</text><text x="110" y="182">250</text>
    </g>
    <rect x="18" y="86" width="130" height="102" fill="none" stroke="#DCDCDC"/>
  </g>
  <!-- arrow -->
  <path d="M156 136 l18 0 M170 131 l6 5 l-6 5" stroke="#96BED7" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- wide (after) -->
  <g font-size="10.5">
    <text x="182" y="80" font-size="10.5" fill="#6A6280">wide</text>
    <rect x="182" y="86" width="160" height="22" fill="#281C60"/>
    <text x="190" y="101" font-size="9.5" font-weight="600" fill="#FFFFFF">Region</text>
    <text x="238" y="101" font-size="9.5" font-weight="600" fill="#96BED7">Q1</text>
    <text x="264" y="101" font-size="9.5" font-weight="600" fill="#96BED7">Q2</text>
    <text x="290" y="101" font-size="9.5" font-weight="600" fill="#96BED7">Q3</text>
    <text x="316" y="101" font-size="9.5" font-weight="600" fill="#96BED7">Q4</text>
    <rect x="182" y="108" width="160" height="24" fill="#FFFFFF"/>
    <rect x="230" y="108" width="112" height="24" fill="#E7F1F8"/>
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#281C60">
      <text x="190" y="124">NA</text>
      <text x="238" y="124">100</text>
      <text x="264" y="124">150</text>
      <text x="290" y="124">200</text>
      <text x="316" y="124">250</text>
    </g>
    <rect x="182" y="86" width="160" height="46" fill="none" stroke="#96BED7"/>
    <text x="182" y="152" font-size="10" fill="#6A6280">one row per Region,</text>
    <text x="182" y="166" font-size="10" fill="#6A6280">one column per Quarter</text>
  </g>
</svg>
