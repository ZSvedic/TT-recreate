<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 230" width="360" height="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <!-- TamedTable feature illustration: Undo anything — ":undo / :redo" -->
  <rect x="2" y="2" width="356" height="226" rx="16" fill="#FFFFFF" stroke="#DCDCDC"/>
  <!-- prompt chip -->
  <rect x="18" y="18" width="324" height="36" rx="18" fill="#EFEBF7" stroke="#D8D0EC"/>
  <text x="34" y="41" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13.5" fill="#96BED7">:undo</text>
  <text x="92" y="41" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13.5" fill="#281C60">/</text>
  <text x="106" y="41" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13.5" fill="#96BED7">:redo</text>
  <!-- history timeline -->
  <text x="32" y="84" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11.5" fill="#6A6280">history</text>
  <line x1="40" y1="118" x2="320" y2="118" stroke="#DCDCDC" stroke-width="2"/>
  <!-- committed step, then the undone step shown faint -->
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#281C60" text-anchor="middle">
    <circle cx="110" cy="118" r="8" fill="#281C60"/>
    <text x="110" y="142">open customers-input.csv</text>
    <!-- current head, reverted step shown faint -->
    <circle cx="250" cy="118" r="9" fill="#FFFFFF" stroke="#96BED7" stroke-width="2" stroke-dasharray="3 3"/>
    <text x="250" y="142" fill="#A39CBF">normalize the phone numbers</text>
  </g>
  <!-- undo arc back from normalize to open -->
  <path d="M250 100 q-70 -44 -140 0" fill="none" stroke="#96BED7" stroke-width="2"/>
  <path d="M106 93 l6 8 l9 -3 Z" fill="#96BED7"/>
  <!-- caption pill -->
  <rect x="92" y="178" width="176" height="30" rx="15" fill="#E7F1F8" stroke="#96BED7"/>
  <text x="180" y="198" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#281C60" text-anchor="middle">step back, anytime</text>
</svg>
