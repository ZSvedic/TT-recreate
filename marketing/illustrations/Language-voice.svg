<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 230" width="360" height="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <!-- TamedTable feature illustration: Speak instead of type — "tap the mic" -->
  <rect x="2" y="2" width="356" height="226" rx="16" fill="#FFFFFF" stroke="#DCDCDC"/>
  <!-- transcribed prompt chip -->
  <rect x="18" y="18" width="324" height="36" rx="18" fill="#EFEBF7" stroke="#D8D0EC"/>
  <text x="34" y="41" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13.5" fill="#281C60">normalize DOB column</text>
  <!-- mic button -->
  <circle cx="120" cy="138" r="46" fill="#E7F1F8" stroke="#96BED7"/>
  <circle cx="120" cy="138" r="46" fill="none" stroke="#96BED7" opacity="0.5"/>
  <circle cx="120" cy="138" r="58" fill="none" stroke="#96BED7" opacity="0.25"/>
  <!-- mic glyph -->
  <rect x="111" y="116" width="18" height="30" rx="9" fill="#281C60"/>
  <path d="M102 138 a18 18 0 0 0 36 0" fill="none" stroke="#281C60" stroke-width="2.5"/>
  <line x1="120" y1="156" x2="120" y2="166" stroke="#281C60" stroke-width="2.5"/>
  <line x1="111" y1="166" x2="129" y2="166" stroke="#281C60" stroke-width="2.5"/>
  <!-- waveform -->
  <g stroke="#281C60" stroke-width="3" stroke-linecap="round">
    <line x1="196" y1="130" x2="196" y2="146"/>
    <line x1="210" y1="120" x2="210" y2="156"/>
    <line x1="224" y1="108" x2="224" y2="168"/>
    <line x1="238" y1="122" x2="238" y2="154"/>
    <line x1="252" y1="132" x2="252" y2="144"/>
    <line x1="266" y1="116" x2="266" y2="160"/>
    <line x1="280" y1="126" x2="280" y2="150"/>
    <line x1="294" y1="134" x2="294" y2="142"/>
  </g>
  <!-- caption -->
  <text x="180" y="206" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#6A6280" text-anchor="middle">tap the mic — say it out loud</text>
</svg>
