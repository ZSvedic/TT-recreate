<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 230" width="360" height="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <!-- TamedTable feature illustration: Ask in any language — "normaliza los números de teléfono" -->
  <rect x="2" y="2" width="356" height="226" rx="16" fill="#FFFFFF" stroke="#DCDCDC"/>
  <!-- prompt chip in Spanish -->
  <rect x="18" y="18" width="324" height="36" rx="18" fill="#EFEBF7" stroke="#D8D0EC"/>
  <circle cx="40" cy="36" r="7" fill="#96BED7"/>
  <path d="M37.5 32.5 L43.5 36 L37.5 39.5 Z" fill="#281C60"/>
  <text x="56" y="41" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12.5" fill="#281C60">normaliza los números de teléfono</text>
  <!-- language tags -->
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" text-anchor="middle">
    <rect x="22" y="70" width="34" height="24" rx="12" fill="#96BED7"/>
    <text x="39" y="86" fill="#281C60">ES</text>
    <rect x="62" y="70" width="34" height="24" rx="12" fill="#E7F1F8" stroke="#96BED7"/>
    <text x="79" y="86" fill="#281C60">EN</text>
    <rect x="102" y="70" width="34" height="24" rx="12" fill="#E7F1F8" stroke="#96BED7"/>
    <text x="119" y="86" fill="#281C60">FR</text>
    <rect x="142" y="70" width="34" height="24" rx="12" fill="#E7F1F8" stroke="#96BED7"/>
    <text x="159" y="86" fill="#281C60">DE</text>
    <rect x="182" y="70" width="34" height="24" rx="12" fill="#E7F1F8" stroke="#96BED7"/>
    <text x="199" y="86" fill="#281C60">日本</text>
    <text x="232" y="86" fill="#6A6280" text-anchor="start" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11">…any</text>
  </g>
  <!-- resulting table: real customers-input.csv rows, bare E.164 output -->
  <g>
    <path d="M18 116 q0 -6 6 -6 h312 q6 0 6 6 v22 h-324 Z" fill="#281C60"/>
    <text x="32" y="129" font-size="12" font-weight="600" fill="#FFFFFF">customer</text>
    <text x="130" y="129" font-size="12" font-weight="600" fill="#FFFFFF">before</text>
    <text x="246" y="129" font-size="12" font-weight="600" fill="#96BED7">after</text>
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#281C60">
      <rect x="18" y="138" width="324" height="30" fill="#FFFFFF"/>
      <text x="32" y="158" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5">John D. Doe</text>
      <text x="130" y="158">(200) 555-1234</text>
      <rect x="240" y="142" width="94" height="22" rx="5" fill="#E7F1F8" stroke="#96BED7"/>
      <text x="246" y="158">+12005551234</text>
      <rect x="18" y="168" width="324" height="30" fill="#F6F2EB"/>
      <text x="32" y="188" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5">bob mcdonald</text>
      <text x="130" y="188">0044-555-8765</text>
      <rect x="240" y="172" width="94" height="22" rx="5" fill="#E7F1F8" stroke="#96BED7"/>
      <text x="246" y="188">+445558765</text>
    </g>
    <rect x="18" y="110" width="324" height="92" rx="6" fill="none" stroke="#DCDCDC"/>
  </g>
</svg>
