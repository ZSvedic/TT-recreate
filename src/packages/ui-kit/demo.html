<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ui-kit demo — TamedTable</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; }
    #app { min-height: 100vh; padding: 16px; box-sizing: border-box; }
    h2 { font-size: 14px; margin: 16px 0 8px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    #icons { display: grid; grid-template-columns: repeat(8, 32px); gap: 8px; }
    #out { white-space: pre-line; font-family: monospace; font-size: 12px; opacity: .7;
           border-top: 1px solid #DCDCDC; margin-top: 12px; padding-top: 8px; }
  </style>
</head>
<body>
  <div id="app">
    <h1>@tamedtable/ui-kit demo</h1>
    <h2>Buttons</h2>
    <div id="buttons" class="row"></div>
    <h2>Icons</h2>
    <div id="icons"></div>
    <h2>Split button</h2>
    <div id="split" class="row"></div>
    <h2>Toasts &amp; theme</h2>
    <div id="controls" class="row"></div>
    <div id="toasts"></div>
    <div id="out"></div>
  </div>
  <script src="./demo.js"></script>
</body>
</html>
