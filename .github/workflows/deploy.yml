name: Deploy site to GitHub Pages
# Publishes project pages at https://zsvedic.github.io/TT-recreate/ — this
# recreation repo has no custom domain. Uses the Actions-native Pages flow
# (configure-pages → upload-pages-artifact → deploy-pages): the workflow token
# can self-enable a *workflow-sourced* Pages site with `pages: write`, while
# creating a branch-sourced site needs repo-admin the token does not have.
# (The original repo publishes a gh-pages branch shared with PR previews;
# pr-preview.yml needs rework before previews return — see
# temp/recreate-status.md.)
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'spec/**'
      - 'cassettes/**'
      - 'marketing/web/**'
      - '.github/workflows/deploy.yml'
      - '.github/scripts/build-site.sh'
  workflow_dispatch:  # manual rebuild from the Actions tab
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages-deploy
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      # Same cache as ci.yml (bun store + Playwright Chromium, keyed on
      # bun.lock), so a deploy reuses what a CI run already downloaded.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/ms-playwright
          key: deps-${{ runner.os }}-${{ hashFiles('src/bun.lock') }}
          restore-keys: deps-${{ runner.os }}-
      - run: bun install
        working-directory: src
      # Assemble _site for the prod prefix: marketing homepage at the root, the
      # web app under /app/, module demos under /demos/, and the static tour
      # data (tutorials/, samples/, cassettes/). See build-site.sh.
      - name: Build site
        run: .github/scripts/build-site.sh
        env:
          # Project pages: served under the repo prefix, not a domain root.
          SITE_BASE: /TT-recreate/
          OUT_DIR: _site
      # Smoke-gate the exact bytes about to deploy: every demo's #out signals
      # ready and the filter-tour deep link replays to completion (tests/smoke.ts).
      - run: bunx playwright install chromium
        working-directory: src
      - name: Smoke test the built site
        run: bun run test:smoke
        working-directory: src
        env:
          SMOKE_SITE_DIR: ${{ github.workspace }}/_site
      # enablement: true creates the Pages site on first run (idempotent).
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site
      - uses: actions/deploy-pages@v4
        id: deployment
