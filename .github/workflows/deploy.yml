name: Deploy site to GitHub Pages
# Publishes to the gh-pages branch (Pages source: "Deploy from a branch") as
# project pages at https://zsvedic.github.io/TT-recreate/ — this recreation
# repo has no custom domain. The branch source is shared with PR previews:
# prod lives at the branch root, previews under pr-preview/pr-<N>/. keep_files
# preserves those preview subdirs when prod redeploys.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'spec/**'
      - 'cassettes/**'
      - 'marketing/web/**'
      - '.github/workflows/deploy.yml'
      - '.github/scripts/build-site.sh'
  workflow_dispatch:  # manual rebuild from the Actions tab
permissions:
  contents: write
  pages: write
concurrency:
  group: pages-deploy
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      # Same cache as ci.yml (bun store + Playwright Chromium, keyed on
      # bun.lock), so a deploy reuses what a CI run already downloaded.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/ms-playwright
          key: deps-${{ runner.os }}-${{ hashFiles('src/bun.lock') }}
          restore-keys: deps-${{ runner.os }}-
      - run: bun install
        working-directory: src
      # Assemble _site for the prod prefix: marketing homepage at the root, the
      # web app under /app/, module demos under /demos/, and the static tour
      # data (tutorials/, samples/, cassettes/). See build-site.sh.
      - name: Build site
        run: .github/scripts/build-site.sh
        env:
          # Project pages: served under the repo prefix, not a domain root.
          SITE_BASE: /TT-recreate/
          OUT_DIR: _site
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          keep_files: true  # don't wipe pr-preview/ subdirs
      # First deploy on a fresh repo: create the Pages site pointing at the
      # gh-pages branch just pushed above. Idempotent — 409 means it already
      # exists. (Runs here because agent sandboxes cannot reach the Pages API.)
      - name: Ensure Pages is enabled (source gh-pages branch)
        run: |
          code=$(curl -s -o /tmp/pages.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}')
          cat /tmp/pages.json
          echo "pages create: HTTP $code"
          [ "$code" = "201" ] || [ "$code" = "409" ] || exit 1
