name: CI
# Runs the real test suite on every PR so reviewers (and autonomous agents on a
# claude/* branch) get a pass/fail gate. workflow_dispatch lets an agent
# re-trigger the run via the GitHub API after pushing a fix.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      # Cache the bun install store and the Playwright browser download — both
      # keyed on bun.lock, so a run only pays the install/download cost when
      # dependencies change. The Chromium download is the slowest CI step.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/ms-playwright
          key: deps-${{ runner.os }}-${{ hashFiles('src/bun.lock') }}
          restore-keys: deps-${{ runner.os }}-
      - run: bun install
        working-directory: src
      - run: bun run typecheck
        working-directory: src
      # The @web cucumber profile's package demos drive headless Chromium;
      # `bun install` alone does not fetch the browser binary. `--with-deps`
      # is skipped — a cache hit makes the install a no-op.
      - run: bunx playwright install chromium
        working-directory: src
      # Offline + key-free: the runner defaults TAMEDTABLE_CASSETTE=replay, so
      # every model call is served from a recorded cassette. No secrets needed.
      # `bun run test` covers unit + @headless + @cli + full @web (app
      # scenarios in Node, package demos in headless Chromium).
      - run: bun run test
        working-directory: src
