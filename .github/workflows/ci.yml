name: CI
# Runs the real test suite on every PR so reviewers (and autonomous agents on a
# claude/* branch) get a pass/fail gate. workflow_dispatch lets an agent
# re-trigger the run via the GitHub API after pushing a fix.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      # Cache the bun install store, keyed on bun.lock, so a run only pays the
      # install cost when dependencies change. (The Playwright Chromium cache
      # returns with the package demo suite — see temp/recreate-status.md.)
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: deps-${{ runner.os }}-${{ hashFiles('src/bun.lock') }}
          restore-keys: deps-${{ runner.os }}-
      - run: bun install
        working-directory: src
      - run: bun run typecheck
        working-directory: src
      # Offline + key-free: the runner defaults TAMEDTABLE_CASSETTE=replay, so
      # every model call is served from a recorded cassette. No secrets needed.
      - run: bun run test
        working-directory: src
      # App-level @web scenarios (WebController in Node — no browser). The
      # package demo scenarios (headless Chromium) are not implemented yet, so
      # the full `test:web` profile stays out of `bun run test` for now.
      - run: bun run test:web:app
        working-directory: src
